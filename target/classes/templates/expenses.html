<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Budget Tracker</title>
    <style>
        body{font-family: Arial, sans-serif;margin:24px}
        h1{margin-bottom:10px}
        form, table{margin-top:16px}
        table{border-collapse:collapse;width:100%}
        th,td{border:1px solid #ddd;padding:8px;vertical-align:top}
        th{background:#f5f5f5}
        .row{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap}
        .field{display:flex;flex-direction:column}
        .msg{color:green;margin:8px 0}
        button{padding:6px 12px;cursor:pointer}
    </style>
</head>
<body>

<h1>Budget Tracker</h1>
<div class="msg" th:if="${msg}" th:text="${msg}"></div>

<h3>Add Expense</h3>
<form th:action="@{/ui/expenses}" method="post">
    <div class="row">
        <label class="field">Amount
            <input name="amount" type="number" step="0.01" required>
        </label>

        <label class="field">Date
            <input name="date" type="date" required>
        </label>

        <label class="field">Description
            <input name="description" type="text" placeholder="groceries, gas" required>
        </label>

        <label class="field">Payment Method
            <select name="paymentMethod" required>
                <option value="CARD">CARD</option>
                <option value="CASH">CASH</option>
                <option value="OTHER">OTHER</option>
            </select>
        </label>

        <label class="field">Category
            <select name="categoryId" required>
                <option value="" disabled selected>Select</option>
                <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}"></option>
            </select>
        </label>

        <button type="submit">Save</button>
    </div>
</form>

<form th:action="@{/ui/expenses}" method="get" style="margin-top:12px">
    <label>filter by category:
        <select name="categoryId" onchange="this.form.submit()">
            <option th:selected="${selectedCategoryId == null}" value="">(All)</option>
            <option th:each="c : ${categories}"
                    th:value="${c.id}"
                    th:text="${c.name}"
                    th:selected="${selectedCategoryId != null and selectedCategoryId == c.id}">
            </option>
        </select>
    </label>
    <noscript><button type="submit">Apply</button></noscript>
</form>

<h3 style="margin-top:16px;">Recent Expenses</h3>
<table>
    <thead>
    <tr>
        <th>ID</th><th>Date</th><th>Description</th><th>Category</th><th>Payment</th><th>Amount</th><th></th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="e : ${expenses}">
        <td th:text="${e.id}"></td>
        <td th:text="${#temporals.format(e.date, 'MM-dd-yyyy')}"></td>
        <td th:text="${e.description}"></td>
        <td th:text="${e.category.name}"></td>
        <td th:text="${e.paymentMethod}"></td>
        <td th:text="${e.amount}"></td>
        <td>
            <form th:action="@{'/ui/expenses/' + ${e.id} + '/delete'}" method="post"
                  onsubmit="return confirm('Delete this expense?');">
                <button type="submit">Delete</button>
            </form>
        </td>
    </tr>
    <tr th:if="${#lists.isEmpty(expenses)}"><td colspan="7">No expenses yet.</td></tr>
    </tbody>
</table>

</body>
</html>
